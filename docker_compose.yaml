services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: echorep
      POSTGRES_PASSWORD: echorep_dev
      POSTGRES_DB: echorep
    ports:
      - '5432:5432'
    volumes:
      - echorep_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U echorep -d echorep']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - '8080:8080'
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ConnectionStrings__DefaultConnection: >-
        Host=db;Port=5432;Database=echorep;Username=echorep;Password=echorep_dev
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - '5173:5173'
    environment:
      VITE_API_URL: http://localhost:8080
    depends_on:
      - api

volumes:
  echorep_pgdata:
